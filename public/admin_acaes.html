<!DOCTYPE html>
<html>
<head>
    <title>Admin ACAES Sucre</title>
    <style>
        body { background: #0b0e14; color: #00d4ff; font-family: sans-serif; padding: 30px; }
        input, select { display: block; width: 100%; margin: 15px 0; background: #1a1f26; border: 1px solid #00d4ff; color: white; padding: 12px; border-radius: 5px; }
        button { background: #00d4ff; color: #0b0e14; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>🛠️ Panel Súper Admin ACAES</h2>
    <input type="text" id="titulo" placeholder="Título de la publicación">
    <input type="text" id="link" placeholder="Enlace (YouTube, PDF, etc)">
    <select id="tipo">
        <option value="Imagen">Imagen 📸</option>
        <option value="Video">Video 🎥</option>
        <option value="Investigacion">Investigación 📄</option>
    </select>
    <label><input type="checkbox" id="notif"> 📢 Notificar a todo Sucre (Bot 2)</label>
    <button onclick="enviar()">PUBLICAR Y NOTIFICAR 🚀</button>

    <script>
        async function enviar() {
            const data = {
                titulo: document.getElementById('titulo').value,
                link: document.getElementById('link').value,
                tipo: document.getElementById('tipo').value,
                notifyPublic: document.getElementById('notif').checked,
                userAdmin: localStorage.getItem('usuario_acaes')
            };
            await fetch('/api/publicar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            alert("¡Lanzado con éxito! 🛰️");
        }
    </script>
</body>
</html>
