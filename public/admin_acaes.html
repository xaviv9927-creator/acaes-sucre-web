<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin ACAES - Panel completo</title>
    <style>
        body { background: #0b0e14; color: #ccc; font-family: system-ui; padding: 20px; max-width: 800px; margin: auto; }
        input, select, textarea { width: 100%; margin: 12px 0; background: #1a1f2a; border: 1px solid #00d4ff; color: white; padding: 12px; border-radius: 12px; }
        button { background: #00d4ff; color: #0b0e14; border: none; padding: 14px; width: 100%; font-weight: bold; border-radius: 40px; cursor: pointer; margin-top: 10px; }
        .preview { background: #0f121c; border: 1px dashed #00d4ff; border-radius: 20px; padding: 15px; margin: 20px 0; }
        .post-item { background: #1a1f2a; border-radius: 12px; padding: 12px; margin-bottom: 12px; border-left: 3px solid #00d4ff; }
        .post-item button { width: auto; padding: 6px 12px; margin-top: 8px; background: #ff4444; color: white; }
        .seccion { background: #0f121c; border-radius: 20px; padding: 20px; margin-bottom: 30px; }
        .error { color: #ff8888; background: #330000; padding: 10px; border-radius: 12px; margin-top: 10px; }
        .exito { color: #88ff88; background: #003300; padding: 10px; border-radius: 12px; }
        hr { border-color: #00d4ff33; margin: 20px 0; }
        h3 { color: #00d4ff; margin-top: 0; }
    </style>
</head>
<body>
<h2>🛸 Panel Súper Admin ACAES</h2>

<div class="seccion">
    <h3>📱 Configurar WhatsApp</h3>
    <input type="text" id="whatsappNumero" placeholder="Código país + número (ej: 584241234567)">
    <button onclick="actualizarWhatsApp()">Actualizar número WhatsApp</button>
    <div id="msgWhatsapp"></div>
</div>

<div class="seccion">
    <h3>📝 Nueva publicación</h3>
    <form id="formPublicar" enctype="multipart/form-data">
        <input type="text" id="titulo" placeholder="Título *" required>
        <textarea id="contenido" rows="3" placeholder="Descripción"></textarea>
        <select id="tipo">
            <option value="Noticia">📰 Noticia</option>
            <option value="Investigacion">🔬 Investigación</option>
            <option value="Avistamiento">🔭 Avistamiento</option>
        </select>
        <input type="text" id="enlace_externo" placeholder="Enlace externo (YouTube, PDF, etc)">
        <input type="file" id="archivo" accept="image/*,application/pdf">
        <label><input type="checkbox" id="notif"> 📢 Notificar a todo Sucre</label>
        <button type="submit">🚀 PUBLICAR</button>
    </form>
    <div class="preview">
        <strong>Vista previa:</strong>
        <div id="previewContent">Esperando datos...</div>
    </div>
</div>

<div class="seccion">
    <h3>🗑️ Gestionar publicaciones</h3>
    <div id="listaPosts">Cargando...</div>
</div>

<script>
    const userAdmin = localStorage.getItem('usuario_acaes') || prompt("📛 Tu nombre de admin:");
    if(userAdmin) localStorage.setItem('usuario_acaes', userAdmin);

    // Vista previa
    function actualizarVistaPrevia() {
        const titulo = document.getElementById('titulo').value || "Sin título";
        const tipo = document.getElementById('tipo').value;
        const contenido = document.getElementById('contenido').value;
        const enlace = document.getElementById('enlace_externo').value;
        const archivo = document.getElementById('archivo').files[0];
        let html = `<strong>${titulo}</strong> (${tipo})<br>`;
        if(contenido) html += `<p>${contenido.substring(0,100)}...</p>`;
        if(enlace) html += `🔗 Enlace listo<br>`;
        if(archivo) html += `📎 ${archivo.name}`;
        document.getElementById('previewContent').innerHTML = html;
    }
    document.getElementById('titulo').addEventListener('input', actualizarVistaPrevia);
    document.getElementById('contenido').addEventListener('input', actualizarVistaPrevia);
    document.getElementById('tipo').addEventListener('change', actualizarVistaPrevia);
    document.getElementById('enlace_externo').addEventListener('input', actualizarVistaPrevia);
    document.getElementById('archivo').addEventListener('change', actualizarVistaPrevia);

    // Cargar WhatsApp actual
    async function cargarWhatsAppActual() {
        const res = await fetch('/api/config');
        const cfg = await res.json();
        document.getElementById('whatsappNumero').placeholder = cfg.whatsapp;
    }

    // Actualizar WhatsApp
    async function actualizarWhatsApp() {
        const numero = document.getElementById('whatsappNumero').value;
        if(!numero.match(/^[0-9]{10,15}$/)) {
            document.getElementById('msgWhatsapp').innerHTML = '<div class="error">Número inválido (solo dígitos, 10-15)</div>';
            return;
        }
        const res = await fetch('/api/config/whatsapp', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ numero })
        });
        const data = await res.json();
        if(res.ok) {
            document.getElementById('msgWhatsapp').innerHTML = '<div class="exito">✅ Número actualizado</div>';
            cargarWhatsAppActual();
        } else {
            document.getElementById('msgWhatsapp').innerHTML = `<div class="error">❌ ${data.error}</div>`;
        }
    }

    // Listar publicaciones con botón eliminar
    async function cargarListaPosts() {
        const res = await fetch('/api/posts');
        const posts = await res.json();
        const div = document.getElementById('listaPosts');
        if(!posts.length) {
            div.innerHTML = '<p>No hay publicaciones</p>';
            return;
        }
        div.innerHTML = posts.map(post => `
            <div class="post-item">
                <strong>${escapeHtml(post.titulo)}</strong><br>
                <small>${post.tipo} | ${new Date(post.fecha_creacion).toLocaleString()} | por ${escapeHtml(post.userAdmin)}</small><br>
                <button onclick="eliminarPost(${post.id})">🗑️ Eliminar</button>
            </div>
        `).join('');
    }

    async function eliminarPost(id) {
        if(!confirm("¿Eliminar esta publicación permanentemente?")) return;
        const res = await fetch(`/api/posts/${id}`, { method: 'DELETE' });
        if(res.ok) {
            cargarListaPosts();
            document.getElementById('msgWhatsapp').innerHTML = '<div class="exito">✅ Publicación eliminada</div>';
        } else {
            alert("Error al eliminar");
        }
    }

    // Enviar nueva publicación
    const form = document.getElementById('formPublicar');
    form.onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData();
        formData.append('titulo', document.getElementById('titulo').value);
        formData.append('contenido', document.getElementById('contenido').value);
        formData.append('tipo', document.getElementById('tipo').value);
        formData.append('enlace_externo', document.getElementById('enlace_externo').value);
        formData.append('notifyPublic', document.getElementById('notif').checked);
        formData.append('userAdmin', userAdmin);
        const archivo = document.getElementById('archivo').files[0];
        if(archivo) formData.append('archivo', archivo);

        const btn = document.querySelector('#formPublicar button');
        btn.disabled = true;
        btn.innerText = '🛰️ Publicando...';

        try {
            const res = await fetch('/api/publicar', { method: 'POST', body: formData });
            const data = await res.json();
            if(res.ok) {
                document.getElementById('msgWhatsapp').innerHTML = '<div class="exito">✅ Publicado con éxito</div>';
                form.reset();
                actualizarVistaPrevia();
                cargarListaPosts();
            } else {
                throw new Error(data.error);
            }
        } catch(err) {
            document.getElementById('msgWhatsapp').innerHTML = `<div class="error">❌ ${err.message}</div>`;
        } finally {
            btn.disabled = false;
            btn.innerText = '🚀 PUBLICAR';
        }
    };

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;';}); }

    cargarWhatsAppActual();
    cargarListaPosts();
    actualizarVistaPrevia();
</script>
</body>
</html>
