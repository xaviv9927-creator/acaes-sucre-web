<!DOCTYPE html>
<html>
<head>
    <title>Panel de Control - ACAES</title>
    <style>
        body { background: #0b0e14; color: #00d4ff; padding: 20px; }
        input, select { display: block; width: 100%; margin-bottom: 10px; background: #1a1f26; color: white; border: 1px solid #00d4ff; padding: 10px; }
        button { background: #00d4ff; color: black; font-weight: bold; padding: 10px 20px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🛠️ Panel Súper Admin</h2>
    <input type="text" id="pass" placeholder="Clave de acceso">
    <hr>
    <input type="text" id="titulo" placeholder="Título de la publicación">
    <input type="text" id="link" placeholder="Link de Video / Archivo / PDF">
    <select id="tipo">
        <option value="Imagen">Imagen 📸</option>
        <option value="Video">Video 🎥</option>
        <option value="PDF">Investigación 📄</option>
    </select>
    <label><input type="checkbox" id="publicNotif"> 📢 ¿Notificar a todo Sucre (Bot 2)?</label>
    <button onclick="publicar()">LANZAR PUBLICACIÓN 🚀</button>

    <script>
        async function publicar() {
            // Lógica para enviar a server.js y disparar los bots
            alert("Publicando y notificando a los bots...");
        }
    </script>
</body>
</html>
