<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin ACAES | Panel de Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0e14; color: #ccc; font-family: system-ui; padding: 20px; max-width: 800px; margin: auto; overscroll-behavior: none; }
        input, select, textarea { width: 100%; margin: 12px 0; background: #1a1f2a; border: 1px solid #00d4ff; color: white; padding: 12px; border-radius: 12px; }
        button { background: #00d4ff; color: #0b0e14; border: none; padding: 14px; width: 100%; font-weight: bold; border-radius: 40px; cursor: pointer; margin-top: 10px; }
        .preview { background: #0f121c; border: 1px dashed #00d4ff; border-radius: 20px; padding: 15px; margin: 20px 0; }
        .post-item, .usuario-item, .seccion-item { background: #1a1f2a; border-radius: 12px; padding: 12px; margin-bottom: 12px; border-left: 3px solid #00d4ff; }
        .post-item button, .seccion-item button { width: auto; padding: 6px 12px; margin-top: 8px; background: #ff4444; color: white; display: inline-block; margin-right: 8px; }
        .post-item button.editar { background: #ffaa00; }
        .seccion-item button.editar { background: #ffaa00; }
        .seccion { background: #0f121c; border-radius: 20px; padding: 20px; margin-bottom: 30px; }
        .error { color: #ff8888; background: #330000; padding: 10px; border-radius: 12px; margin-top: 10px; }
        .exito { color: #88ff88; background: #003300; padding: 10px; border-radius: 12px; }
        hr { border-color: #00d4ff33; margin: 20px 0; }
        h3 { color: #00d4ff; margin-top: 0; }
        .login-box { max-width: 400px; margin: 100px auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { background: #1a1f2a; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
        .tab.activo { background: #00d4ff; color: #0b0e14; }
        .tab-content { display: none; }
        .tab-content.activo { display: block; }
        .btn-instalar { background: #00d4ff; color: #0b0e14; border: none; padding: 12px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; margin: 20px auto 5px auto; display: block; }
        .credito { text-align: center; font-size: 0.7rem; color: #555; margin-top: 10px; margin-bottom: 20px; }
        .modal-editar { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-editar-content { background: #1a1f2a; padding: 25px; border-radius: 20px; width: 90%; max-width: 500px; border: 1px solid #00d4ff; max-height: 90%; overflow-y: auto; }
        .modal-editar-content input, .modal-editar-content select, .modal-editar-content textarea { margin: 8px 0; }
    </style>
    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const btn = document.getElementById('btnInstalar');
            if(btn) btn.style.display = 'block';
        });
        function instalarApp() {
            if(deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
            }
        }
    </script>
</head>
<body>
<div id="app"></div>
<button id="btnInstalar" onclick="instalarApp()" style="display: none; margin: 20px auto 5px auto;" class="btn-instalar">📲 Instalar App</button>
<div class="credito">Diseñador: Xavier Vargas</div>

<script>
    let logged = false;
    let userAdmin = localStorage.getItem('acaes_admin_nombre') || 'Admin';

    async function checkAuth() {
        try {
            const res = await fetch('/api/admin/check');
            const data = await res.json();
            logged = data.logged;
            if (logged) {
                await cargarConfiguracionInicial();
                renderPanel();
            } else {
                renderLogin();
            }
        } catch(e) {
            renderLogin();
        }
    }

    async function cargarConfiguracionInicial() {
        try {
            const res = await fetch('/api/admin/config');
            const cfg = await res.json();
            window.botTokenActual = cfg.bot_token || '';
            window.adminIdActual = cfg.admin_telegram_id || '';
        } catch(e) {
            window.botTokenActual = '';
            window.adminIdActual = '';
        }
    }

    function renderLogin() {
        document.getElementById('app').innerHTML = `
            <div class="login-box">
                <h2>🔐 Acceso Admin ACAES</h2>
                <input type="password" id="pass" placeholder="Contraseña">
                <button onclick="login()">Ingresar</button>
                <div id="msg"></div>
            </div>
        `;
    }

    window.login = async function() {
        const pass = document.getElementById('pass').value;
        try {
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: pass })
            });
            if (res.ok) {
                logged = true;
                localStorage.setItem('acaes_admin_nombre', 'Admin');
                await cargarConfiguracionInicial();
                renderPanel();
            } else {
                document.getElementById('msg').innerHTML = '<div class="error">Contraseña incorrecta</div>';
            }
        } catch(e) {
            document.getElementById('msg').innerHTML = '<div class="error">Error de conexión</div>';
        }
    };

    window.logout = async function() {
        try {
            await fetch('/api/admin/logout', { method: 'POST' });
        } catch(e) {}
        logged = false;
        localStorage.removeItem('acaes_admin_nombre');
        sessionStorage.clear();
        renderLogin();
    };

    let secciones = [];

    async function cargarSecciones() {
        try {
            const res = await fetch('/api/secciones');
            secciones = await res.json();
        } catch(e) { secciones = []; }
        const div = document.getElementById('listaSecciones');
        if (!secciones || !secciones.length) { div.innerHTML = '<p>Sin secciones</p>'; return; }
        div.innerHTML = secciones.map(sec => `
            <div class="seccion-item">
                <strong>${escapeHtml(sec.nombre)}</strong> (slug: ${sec.slug}) - Orden: ${sec.orden}
                <br>
                <button class="editar" onclick="editarSeccion(${sec.id}, '${escapeHtml(sec.nombre)}', '${sec.slug}', ${sec.orden})">✏️ Editar</button>
                <button onclick="eliminarSeccion(${sec.id})">🗑️ Eliminar</button>
            </div>
        `).join('');
    }

    window.mostrarFormNuevaSeccion = function() {
        document.getElementById('formSeccion').style.display = 'block';
        document.getElementById('seccionId').value = '';
        document.getElementById('seccionNombre').value = '';
        document.getElementById('seccionSlug').value = '';
        document.getElementById('seccionOrden').value = '0';
    };

    window.guardarSeccion = async function() {
        const id = document.getElementById('seccionId').value;
        const nombre = document.getElementById('seccionNombre').value.trim();
        const slug = document.getElementById('seccionSlug').value.trim().toLowerCase().replace(/ /g, '_');
        const orden = parseInt(document.getElementById('seccionOrden').value) || 0;
        
        if (!nombre || !slug) {
            alert('Nombre y slug requeridos');
            return;
        }
        
        const url = id ? `/api/admin/secciones/${id}` : '/api/admin/secciones';
        const method = id ? 'PUT' : 'POST';
        
        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, slug, orden })
            });
            if (res.ok) {
                document.getElementById('formSeccion').style.display = 'none';
                cargarSecciones();
                cargarSeccionesSelect();
            } else {
                const data = await res.json();
                alert('Error: ' + data.error);
            }
        } catch(e) {
            alert('Error de conexión');
        }
    };

    window.editarSeccion = function(id, nombre, slug, orden) {
        document.getElementById('formSeccion').style.display = 'block';
        document.getElementById('seccionId').value = id;
        document.getElementById('seccionNombre').value = nombre;
        document.getElementById('seccionSlug').value = slug;
        document.getElementById('seccionOrden').value = orden;
    };

    window.eliminarSeccion = async function(id) {
        if (!confirm('¿Eliminar esta sección?')) return;
        try {
            const res = await fetch(`/api/admin/secciones/${id}`, { method: 'DELETE' });
            if (res.ok) {
                cargarSecciones();
                cargarSeccionesSelect();
            } else {
                alert('Error al eliminar');
            }
        } catch(e) {
            alert('Error de conexión');
        }
    };

    async function cargarSeccionesSelect() {
        try {
            const res = await fetch('/api/secciones');
            const secciones = await res.json();
            const select = document.getElementById('seccionSelect');
            if (select) {
                select.innerHTML = '<option value="">Sin sección</option>';
                secciones.forEach(sec => {
                    select.innerHTML += `<option value="${sec.id}">${escapeHtml(sec.nombre)}</option>`;
                });
            }
        } catch(e) {}
    }

    // Editar publicación
    window.editarPost = async function(id) {
        try {
            const res = await fetch(`/api/posts/${id}`);
            const post = await res.json();
            
            const modal = document.createElement('div');
            modal.className = 'modal-editar';
            modal.id = 'modalEditar';
            modal.innerHTML = `
                <div class="modal-editar-content">
                    <h3>✏️ Editar Publicación</h3>
                    <input type="text" id="editTitulo" value="${escapeHtml(post.titulo)}" placeholder="Título">
                    <textarea id="editContenido" rows="3" placeholder="Descripción">${escapeHtml(post.contenido || '')}</textarea>
                    <select id="editTipo">
                        <option value="Noticia" ${post.tipo === 'Noticia' ? 'selected' : ''}>📰 Noticia</option>
                        <option value="Investigacion" ${post.tipo === 'Investigacion' ? 'selected' : ''}>🔬 Investigación</option>
                        <option value="Avistamiento" ${post.tipo === 'Avistamiento' ? 'selected' : ''}>🔭 Avistamiento</option>
                    </select>
                    <select id="editSeccion">
                        <option value="">Sin sección</option>
                        ${secciones.map(sec => `<option value="${sec.id}" ${post.seccion_id == sec.id ? 'selected' : ''}>${escapeHtml(sec.nombre)}</option>`).join('')}
                    </select>
                    <input type="text" id="editEnlace" value="${escapeHtml(post.enlace_externo || '')}" placeholder="Enlace externo">
                    <input type="file" id="editArchivo" accept="image/*,application/pdf">
                    <p style="font-size:0.7rem; color:#888;">Si subís un nuevo archivo, reemplazará al anterior</p>
                    <button onclick="guardarEdicion(${id})">💾 Guardar cambios</button>
                    <button onclick="cerrarModalEditar()" style="background:#ff4444;">Cancelar</button>
                </div>
            `;
            document.body.appendChild(modal);
        } catch(e) {
            alert('Error al cargar publicación');
        }
    };

    window.cerrarModalEditar = function() {
        const modal = document.getElementById('modalEditar');
        if(modal) modal.remove();
    };

    window.guardarEdicion = async function(id) {
        const formData = new FormData();
        formData.append('titulo', document.getElementById('editTitulo').value);
        formData.append('contenido', document.getElementById('editContenido').value);
        formData.append('tipo', document.getElementById('editTipo').value);
        formData.append('seccion_id', document.getElementById('editSeccion').value);
        formData.append('enlace_externo', document.getElementById('editEnlace').value);
        formData.append('userAdmin', userAdmin);
        const archivo = document.getElementById('editArchivo').files[0];
        if(archivo) formData.append('archivo', archivo);
        
        try {
            const res = await fetch(`/api/posts/${id}`, { method: 'PUT', body: formData });
            const data = await res.json();
            if(res.ok) {
                alert('✅ Publicación actualizada');
                cerrarModalEditar();
                cargarListaPosts();
            } else {
                alert('Error: ' + data.error);
            }
        } catch(e) {
            alert('Error de conexión');
        }
    };

    async function renderPanel() {
        const html = `
            <h2>🛸 Panel de Control ACAES</h2>
            <button onclick="logout()" style="background:#ff4444; margin-bottom:20px;">🚪 Cerrar sesión</button>
            
            <div class="tabs">
                <div class="tab activo" onclick="mostrarTab('publicar')">📝 Publicar</div>
                <div class="tab" onclick="mostrarTab('secciones')">📁 Secciones</div>
                <div class="tab" onclick="mostrarTab('bot')">🤖 Bot Telegram</div>
                <div class="tab" onclick="mostrarTab('config')">⚙️ Configuración</div>
                <div class="tab" onclick="mostrarTab('usuarios')">👥 Usuarios</div>
                <div class="tab" onclick="mostrarTab('suscriptores')">📡 Suscriptores</div>
                <div class="tab" onclick="mostrarTab('posts')">📋 Publicaciones</div>
            </div>
            
            <div id="tab-publicar" class="tab-content activo">
                <div class="seccion">
                    <h3>📝 Nueva publicación</h3>
                    <form id="formPublicar" enctype="multipart/form-data">
                        <input type="text" id="titulo" placeholder="Título *" required>
                        <textarea id="contenido" rows="3" placeholder="Descripción"></textarea>
                        <select id="tipo">
                            <option value="Noticia">📰 Noticia</option>
                            <option value="Investigacion">🔬 Investigación</option>
                            <option value="Avistamiento">🔭 Avistamiento</option>
                        </select>
                        <select id="seccionSelect">
                            <option value="">Sin sección</option>
                        </select>
                        <input type="text" id="enlace_externo" placeholder="Enlace externo">
                        <input type="file" id="archivo" accept="image/*,application/pdf">
                        <button type="submit">🚀 PUBLICAR Y ENVIAR A TODOS</button>
                    </form>
                    <div class="preview"><strong>Vista previa:</strong><div id="previewContent"></div></div>
                </div>
            </div>
            
            <div id="tab-secciones" class="tab-content">
                <div class="seccion">
                    <h3>📁 Gestionar Secciones</h3>
                    <button onclick="mostrarFormNuevaSeccion()" style="background:#00d4ff; margin-bottom:15px;">+ Nueva Sección</button>
                    <div id="listaSecciones">Cargando...</div>
                    <div id="formSeccion" style="display:none; margin-top:20px; padding:15px; background:#1a1f2a; border-radius:12px;">
                        <h4>Formulario Sección</h4>
                        <input type="hidden" id="seccionId">
                        <input type="text" id="seccionNombre" placeholder="Nombre (ej: Astrofísica)">
                        <input type="text" id="seccionSlug" placeholder="Slug (ej: astrofisica)">
                        <input type="number" id="seccionOrden" placeholder="Orden (1,2,3...)" value="0">
                        <button onclick="guardarSeccion()">Guardar Sección</button>
                        <button onclick="document.getElementById('formSeccion').style.display='none'">Cancelar</button>
                    </div>
                </div>
            </div>
            
            <div id="tab-bot" class="tab-content">
                <div class="seccion">
                    <h3>🤖 Configuración del Bot de Telegram</h3>
                    <label>Token del Bot:</label>
                    <input type="text" id="botToken" placeholder="Token del bot">
                    <label>Tu ID de Telegram (admin):</label>
                    <input type="text" id="adminId" placeholder="Ej: 7501019675">
                    <button onclick="guardarConfigBot()">Guardar configuración del Bot</button>
                    <div id="msgBot"></div>
                    <hr>
                    <p><strong>📌 Configurar Webhook (una sola vez):</strong></p>
                    <button onclick="configurarWebhook()">Configurar Webhook</button>
                    <div id="msgWebhook"></div>
                </div>
            </div>
            
            <div id="tab-config" class="tab-content">
                <div class="seccion">
                    <h3>⚙️ Configuración General</h3>
                    <label>WhatsApp (solo números):</label>
                    <input type="text" id="whatsappNumero" placeholder="584241234567">
                    <button onclick="actualizarWhatsApp()">Actualizar WhatsApp</button>
                    <div id="msgWhatsapp"></div>
                    <hr>
                    <label>Cambiar contraseña admin:</label>
                    <input type="password" id="nuevaPass" placeholder="Nueva contraseña">
                    <button onclick="cambiarPass()">Cambiar contraseña</button>
                    <div id="msgPass"></div>
                </div>
            </div>
            
            <div id="tab-usuarios" class="tab-content">
                <div class="seccion">
                    <h3>👥 Usuarios registrados en la web</h3>
                    <div id="listaUsuarios">Cargando...</div>
                </div>
            </div>
            
            <div id="tab-suscriptores" class="tab-content">
                <div class="seccion">
                    <h3>📡 Suscriptores de Telegram</h3>
                    <div id="listaSuscriptores">Cargando...</div>
                </div>
            </div>
            
            <div id="tab-posts" class="tab-content">
                <div class="seccion">
                    <h3>📋 Publicaciones (${userAdmin})</h3>
                    <div id="listaPosts">Cargando...</div>
                </div>
            </div>
        `;
        document.getElementById('app').innerHTML = html;
        
        await cargarSecciones();
        await cargarSeccionesSelect();
        await cargarListaPosts();
        await cargarUsuarios();
        await cargarSuscriptores();
        await cargarWhatsAppActual();
        
        if (window.botTokenActual) document.getElementById('botToken').value = window.botTokenActual;
        if (window.adminIdActual) document.getElementById('adminId').value = window.adminIdActual;
        
        actualizarVistaPrevia();
        document.getElementById('formPublicar').onsubmit = publicar;
        document.getElementById('titulo').addEventListener('input', actualizarVistaPrevia);
        document.getElementById('contenido').addEventListener('input', actualizarVistaPrevia);
        document.getElementById('tipo').addEventListener('change', actualizarVistaPrevia);
        document.getElementById('enlace_externo').addEventListener('input', actualizarVistaPrevia);
        document.getElementById('archivo').addEventListener('change', actualizarVistaPrevia);
    }

    window.mostrarTab = function(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('activo'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('activo'));
        document.getElementById(`tab-${tab}`).classList.add('activo');
        if(event && event.target) event.target.classList.add('activo');
    };

    async function cargarWhatsAppActual() {
        try {
            const res = await fetch('/api/config');
            const cfg = await res.json();
            if(document.getElementById('whatsappNumero')) {
                document.getElementById('whatsappNumero').value = cfg.whatsapp;
            }
        } catch(e) {}
    }

    window.actualizarWhatsApp = async function() {
        const numero = document.getElementById('whatsappNumero').value;
        if(!numero.match(/^[0-9]{10,15}$/)) {
            document.getElementById('msgWhatsapp').innerHTML = '<div class="error">Número inválido</div>';
            return;
        }
        try {
            const res = await fetch('/api/config/whatsapp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ numero })
            });
            if(res.ok) {
                document.getElementById('msgWhatsapp').innerHTML = '<div class="exito">✅ WhatsApp actualizado</div>';
            } else {
                document.getElementById('msgWhatsapp').innerHTML = '<div class="error">Error</div>';
            }
        } catch(e) {
            document.getElementById('msgWhatsapp').innerHTML = '<div class="error">Error de conexión</div>';
        }
    };

    window.guardarConfigBot = async function() {
        const token = document.getElementById('botToken').value.trim();
        const adminId = document.getElementById('adminId').value.trim();
        
        if (!token) {
            document.getElementById('msgBot').innerHTML = '<div class="error">Token requerido</div>';
            return;
        }
        
        try {
            let res1 = await fetch('/api/admin/bot_token', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ token })
            });
            
            let res2 = { ok: true };
            if (adminId) {
                res2 = await fetch('/api/admin/admin_id', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: adminId })
                });
            }
            
            if (res1.ok && res2.ok) {
                window.botTokenActual = token;
                window.adminIdActual = adminId;
                document.getElementById('msgBot').innerHTML = '<div class="exito">✅ Configuración guardada</div>';
            } else {
                document.getElementById('msgBot').innerHTML = '<div class="error">Error al guardar</div>';
            }
        } catch(e) {
            document.getElementById('msgBot').innerHTML = '<div class="error">Error de conexión</div>';
        }
    };

    window.configurarWebhook = async function() {
        const token = document.getElementById('botToken').value.trim();
        if (!token) {
            document.getElementById('msgWebhook').innerHTML = '<div class="error">Primero guardá el token</div>';
            return;
        }
        const urlActual = window.location.origin;
        const webhookUrl = `${urlActual}/webhook`;
        
        try {
            const res = await fetch(`https://api.telegram.org/bot${token}/setWebhook?url=${webhookUrl}`);
            const data = await res.json();
            if (data.ok) {
                document.getElementById('msgWebhook').innerHTML = '<div class="exito">✅ Webhook configurado correctamente</div>';
            } else {
                document.getElementById('msgWebhook').innerHTML = `<div class="error">Error: ${data.description}</div>`;
            }
        } catch(e) {
            document.getElementById('msgWebhook').innerHTML = '<div class="error">Error de conexión</div>';
        }
    };

    window.cambiarPass = async function() {
        const nuevaPass = document.getElementById('nuevaPass').value;
        if(nuevaPass.length < 4) {
            document.getElementById('msgPass').innerHTML = '<div class="error">Mínimo 4 caracteres</div>';
            return;
        }
        try {
            const res = await fetch('/api/admin/cambiar_pass', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nuevaPass })
            });
            if(res.ok) {
                document.getElementById('msgPass').innerHTML = '<div class="exito">✅ Contraseña cambiada</div>';
                document.getElementById('nuevaPass').value = '';
            } else {
                document.getElementById('msgPass').innerHTML = '<div class="error">Error</div>';
            }
        } catch(e) {
            document.getElementById('msgPass').innerHTML = '<div class="error">Error de conexión</div>';
        }
    };

    async function cargarListaPosts() {
        try {
            const res = await fetch('/api/posts');
            const posts = await res.json();
            const div = document.getElementById('listaPosts');
            if(!posts.length) { div.innerHTML = '<p>Sin publicaciones</p>'; return; }
            div.innerHTML = posts.map(post => `
                <div class="post-item">
                    <strong>${escapeHtml(post.titulo)}</strong><br>
                    <small>${post.tipo} | ${post.seccion_nombre ? post.seccion_nombre + ' | ' : ''}${new Date(post.fecha_creacion).toLocaleString()} | por ${escapeHtml(post.userAdmin)}</small><br>
                    <button class="editar" onclick="editarPost(${post.id})">✏️ Editar</button>
                    <button onclick="eliminarPost(${post.id})">🗑️ Eliminar</button>
                </div>
            `).join('');
        } catch(e) {
            document.getElementById('listaPosts').innerHTML = '<p>Error al cargar</p>';
        }
    }

    async function cargarUsuarios() {
        try {
            const res = await fetch('/api/admin/usuarios');
            const usuarios = await res.json();
            const div = document.getElementById('listaUsuarios');
            if(!usuarios.length) { div.innerHTML = '<p>Sin registros</p>'; return; }
            div.innerHTML = usuarios.map(u => `
                <div class="usuario-item">
                    <strong>${escapeHtml(u.nombre)}</strong><br>
                    📅 ${new Date(u.fecha_registro).toLocaleString()} | IP: ${u.ip || 'desconocida'}
                </div>
            `).join('');
        } catch(e) {
            document.getElementById('listaUsuarios').innerHTML = '<p>Error al cargar</p>';
        }
    }

    async function cargarSuscriptores() {
        try {
            const res = await fetch('/api/admin/suscriptores');
            const subs = await res.json();
            const div = document.getElementById('listaSuscriptores');
            if(!subs.length) { div.innerHTML = '<p>Sin suscriptores aún. Compartí el bot.</p>'; return; }
            div.innerHTML = subs.map(s => `
                <div class="usuario-item">
                    🤖 ${s.nombre || 'Usuario'} ${s.username ? '@'+s.username : ''}<br>
                    📅 ${new Date(s.fecha_suscripcion).toLocaleString()}
                </div>
            `).join('');
        } catch(e) {
            document.getElementById('listaSuscriptores').innerHTML = '<p>Error al cargar</p>';
        }
    }

    window.eliminarPost = async function(id) {
        if(!confirm('¿Eliminar publicación?')) return;
        try {
            const res = await fetch(`/api/posts/${id}`, { method: 'DELETE' });
            if(res.ok) {
                alert('✅ Publicación eliminada');
                cargarListaPosts();
            }
        } catch(e) {}
    };

    function actualizarVistaPrevia() {
        const titulo = document.getElementById('titulo')?.value || 'Sin título';
        const tipo = document.getElementById('tipo')?.value || '';
        const contenido = document.getElementById('contenido')?.value || '';
        const enlace = document.getElementById('enlace_externo')?.value || '';
        const archivo = document.getElementById('archivo')?.files[0];
        let html = `<strong>${escapeHtml(titulo)}</strong> (${tipo})<br>`;
        if(contenido) html += `<p>${escapeHtml(contenido.substring(0,100))}...</p>`;
        if(enlace) html += `🔗 Enlace listo<br>`;
        if(archivo) html += `📎 ${archivo.name}`;
        const preview = document.getElementById('previewContent');
        if(preview) preview.innerHTML = html;
    }

    async function publicar(e) {
        e.preventDefault();
        const formData = new FormData();
        formData.append('titulo', document.getElementById('titulo').value);
        formData.append('contenido', document.getElementById('contenido').value);
        formData.append('tipo', document.getElementById('tipo').value);
        formData.append('seccion_id', document.getElementById('seccionSelect').value);
        formData.append('enlace_externo', document.getElementById('enlace_externo').value);
        formData.append('userAdmin', userAdmin);
        const archivo = document.getElementById('archivo').files[0];
        if(archivo) formData.append('archivo', archivo);
        
        const btn = document.querySelector('#formPublicar button');
        btn.disabled = true;
        btn.innerText = '🛰️ Enviando a todos...';
        
        try {
            const res = await fetch('/api/publicar', { method: 'POST', body: formData });
            const data = await res.json();
            if(res.ok) {
                alert('✅ Publicado y enviado a todos los suscriptores');
                document.getElementById('formPublicar').reset();
                actualizarVistaPrevia();
                cargarListaPosts();
            } else {
                throw new Error(data.error);
            }
        } catch(err) {
            alert('❌ Error: ' + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = '🚀 PUBLICAR Y ENVIAR A TODOS';
        }
    }

    function escapeHtml(str) { 
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m){ return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;';});
    }
    
    checkAuth();
</script>
</body>
</html>
