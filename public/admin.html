<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin ACAES | Panel de Control</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0e14; color: #ccc; font-family: system-ui; padding: 20px; max-width: 1000px; margin: auto; overscroll-behavior: none; }
        input, select, textarea { width: 100%; margin: 12px 0; background: #1a1f2a; border: 1px solid #00d4ff; color: white; padding: 12px; border-radius: 12px; }
        button { background: #00d4ff; color: #0b0e14; border: none; padding: 14px; width: 100%; font-weight: bold; border-radius: 40px; cursor: pointer; margin-top: 10px; }
        .preview { background: #0f121c; border: 1px dashed #00d4ff; border-radius: 20px; padding: 15px; margin: 20px 0; }
        .post-item, .usuario-item, .categoria-item { background: #1a1f2a; border-radius: 12px; padding: 12px; margin-bottom: 12px; border-left: 3px solid #00d4ff; }
        .post-item button, .categoria-item button { width: auto; padding: 6px 12px; margin-top: 8px; background: #ff4444; color: white; display: inline-block; margin-right: 8px; }
        .post-item button.editar, .categoria-item button.editar { background: #ffaa00; }
        .seccion { background: #0f121c; border-radius: 20px; padding: 20px; margin-bottom: 30px; }
        .error { color: #ff8888; background: #330000; padding: 10px; border-radius: 12px; margin-top: 10px; }
        .exito { color: #88ff88; background: #003300; padding: 10px; border-radius: 12px; }
        hr { border-color: #00d4ff33; margin: 20px 0; }
        h3 { color: #00d4ff; margin-top: 0; }
        .login-box { max-width: 400px; margin: 100px auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { background: #1a1f2a; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
        .tab.activo { background: #00d4ff; color: #0b0e14; }
        .tab-content { display: none; }
        .tab-content.activo { display: block; }
        .btn-instalar { background: #00d4ff; color: #0b0e14; border: none; padding: 12px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; margin: 20px auto 5px auto; display: block; }
        .credito { text-align: center; font-size: 0.7rem; color: #555; margin-top: 10px; margin-bottom: 20px; }
        .modal-editar { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-editar-content { background: #1a1f2a; padding: 25px; border-radius: 20px; width: 90%; max-width: 500px; border: 1px solid #00d4ff; max-height: 90%; overflow-y: auto; }
        .flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .flex-row button { width: auto; margin-top: 0; padding: 8px 16px; }
        @media (max-width: 600px) { body { padding: 12px; } .flex-row { flex-direction: column; align-items: stretch; } .flex-row button { width: 100%; } }
    </style>
    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const btn = document.getElementById('btnInstalar');
            if(btn) btn.style.display = 'block';
        });
        function instalarApp() {
            if(deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
            }
        }
    </script>
</head>
<body>
<div id="app"></div>
<button id="btnInstalar" onclick="instalarApp()" style="display: none; margin: 20px auto 5px auto;" class="btn-instalar">📲 Instalar App</button>
<div class="credito">Diseñador: Xavier Vargas</div>

<script>
    let logged = false;
    let userAdmin = localStorage.getItem('acaes_admin_nombre') || 'Admin';
    let categoriasArbol = [];

    async function checkAuth() {
        try {
            const res = await fetch('/api/admin/check');
            const data = await res.json();
            logged = data.logged;
            if (logged) {
                await cargarConfiguracionInicial();
                renderPanel();
            } else {
                renderLogin();
            }
        } catch(e) { renderLogin(); }
    }

    async function cargarConfiguracionInicial() {
        try {
            const res = await fetch('/api/admin/config');
            const cfg = await res.json();
            window.botTokenActual = cfg.bot_token || '';
            window.adminIdActual = cfg.admin_telegram_id || '';
        } catch(e) {}
    }

    function renderLogin() {
        document.getElementById('app').innerHTML = `
            <div class="login-box">
                <h2>🔐 Acceso Admin ACAES</h2>
                <input type="password" id="pass" placeholder="Contraseña">
                <button onclick="login()">Ingresar</button>
                <div id="msg"></div>
            </div>
        `;
    }

    window.login = async function() {
        const pass = document.getElementById('pass').value;
        try {
            const res = await fetch('/api/admin/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: pass })
            });
            if (res.ok) {
                logged = true;
                localStorage.setItem('acaes_admin_nombre', 'Admin');
                await cargarConfiguracionInicial();
                renderPanel();
            } else {
                document.getElementById('msg').innerHTML = '<div class="error">Contraseña incorrecta</div>';
            }
        } catch(e) {
            document.getElementById('msg').innerHTML = '<div class="error">Error de conexión</div>';
        }
    };

    window.logout = async function() {
        try { await fetch('/api/admin/logout', { method: 'POST' }); } catch(e) {}
        logged = false;
        localStorage.removeItem('acaes_admin_nombre');
        sessionStorage.clear();
        renderLogin();
    };

    async function recargarCategorias() {
        const res = await fetch('/api/categorias');
        categoriasArbol = await res.json();
    }

    async function llenarSelectCategorias(selectId, valorSeleccionado = null) {
        await recargarCategorias();
        const select = document.getElementById(selectId);
        if (!select) return;
        select.innerHTML = '<option value="">-- Selecciona categoría --</option>';
        function addOpciones(arr, nivel = 0) {
            arr.forEach(cat => {
                const prefix = '—'.repeat(nivel);
                select.innerHTML += `<option value="${cat.id}" ${valorSeleccionado == cat.id ? 'selected' : ''}>${prefix} ${cat.nombre}</option>`;
                if (cat.hijos) addOpciones(cat.hijos, nivel + 1);
            });
        }
        addOpciones(categoriasArbol);
    }

    async function llenarSubcategorias(selectCatId, selectSubId) {
        const catId = document.getElementById(selectCatId).value;
        const subSelect = document.getElementById(selectSubId);
        if (!subSelect) return;
        subSelect.innerHTML = '<option value="">-- Ninguna --</option>';
        if (!catId) return;
        function findHijos(arr, id) {
            for (let c of arr) {
                if (c.id == id) return c.hijos || [];
                if (c.hijos) {
                    const found = findHijos(c.hijos, id);
                    if (found) return found;
                }
            }
            return [];
        }
        const hijos = findHijos(categoriasArbol, parseInt(catId));
        hijos.forEach(h => {
            subSelect.innerHTML += `<option value="${h.id}">${h.nombre}</option>`;
        });
    }

    window.crearSubcategoria = async function() {
        const catId = document.getElementById('categoriaSelect').value;
        if (!catId) { alert('Primero selecciona una categoría principal'); return; }
        const nombre = prompt('Nombre de la nueva subcategoría:');
        if (!nombre) return;
        let slug = prompt('Slug (identificador único, sin espacios):', nombre.toLowerCase().replace(/ /g, '-'));
        if (!slug) return;
        try {
            const res = await fetch('/api/admin/subcategoria', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, slug, padre_id: catId })
            });
            const data = await res.json();
            if (res.ok) {
                alert('✅ Subcategoría creada');
                await llenarSelectCategorias('categoriaSelect', catId);
                await llenarSubcategorias('categoriaSelect', 'subcategoriaSelect');
            } else {
                alert('Error: ' + data.error);
            }
        } catch(e) { alert('Error de conexión'); }
    };

    async function cargarListaCategorias() {
        await recargarCategorias();
        const div = document.getElementById('listaCategorias');
        if (!div) return;
        function renderCats(arr, nivel = 0) {
            let html = '';
            arr.forEach(cat => {
                html += `<div class="categoria-item" style="margin-left: ${nivel * 20}px">
                    <strong>${escapeHtml(cat.nombre)}</strong> (slug: ${cat.slug})
                    <br>
                    <button class="editar" onclick="editarCategoria(${cat.id}, '${escapeHtml(cat.nombre)}', '${cat.slug}', ${cat.padre_id})">✏️ Editar</button>
                    <button onclick="eliminarCategoria(${cat.id})">🗑️ Eliminar</button>
                </div>`;
                if (cat.hijos) html += renderCats(cat.hijos, nivel + 1);
            });
            return html;
        }
        div.innerHTML = renderCats(categoriasArbol) || '<p>No hay categorías</p>';
    }

    window.mostrarFormNuevaCategoria = function() {
        document.getElementById('formCategoria').style.display = 'block';
        document.getElementById('catId').value = '';
        document.getElementById('catNombre').value = '';
        document.getElementById('catSlug').value = '';
        document.getElementById('catPadreSelect').value = '0';
        document.getElementById('catOrden').value = '0';
        llenarSelectPadre();
    };

    async function llenarSelectPadre() {
        await recargarCategorias();
        const select = document.getElementById('catPadreSelect');
        select.innerHTML = '<option value="0">Ninguna (raíz)</option>';
        function addOpts(arr, nivel = 0) {
            arr.forEach(cat => {
                select.innerHTML += `<option value="${cat.id}">${'—'.repeat(nivel)} ${cat.nombre}</option>`;
                if (cat.hijos) addOpts(cat.hijos, nivel + 1);
            });
        }
        addOpts(categoriasArbol);
    }

    window.guardarCategoria = async function() {
        const id = document.getElementById('catId').value;
        const nombre = document.getElementById('catNombre').value.trim();
        const slug = document.getElementById('catSlug').value.trim().toLowerCase().replace(/ /g, '_');
        const padre_id = parseInt(document.getElementById('catPadreSelect').value);
        const orden = parseInt(document.getElementById('catOrden').value) || 0;
        if (!nombre || !slug) { alert('Nombre y slug requeridos'); return; }
        const url = id ? `/api/admin/categorias/${id}` : '/api/admin/categorias';
        const method = id ? 'PUT' : 'POST';
        try {
            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, slug, padre_id, orden })
            });
            if (res.ok) {
                document.getElementById('formCategoria').style.display = 'none';
                await cargarListaCategorias();
                await llenarSelectCategorias('categoriaSelect');
            } else alert('Error');
        } catch(e) { alert('Error de conexión'); }
    };

    window.editarCategoria = async function(id, nombre, slug, padre_id) {
        await llenarSelectPadre();
        document.getElementById('formCategoria').style.display = 'block';
        document.getElementById('catId').value = id;
        document.getElementById('catNombre').value = nombre;
        document.getElementById('catSlug').value = slug;
        document.getElementById('catPadreSelect').value = padre_id;
        document.getElementById('catOrden').value = '0';
    };

    window.eliminarCategoria = async function(id) {
        if (!confirm('¿Eliminar categoría y todas sus subcategorías?')) return;
        try {
            const res = await fetch(`/api/admin/categorias/${id}`, { method: 'DELETE' });
            if (res.ok) {
                await cargarListaCategorias();
                await llenarSelectCategorias('categoriaSelect');
            } else alert('Error');
        } catch(e) { alert('Error'); }
    };

    async function cargarListaPosts() {
        try {
            const res = await fetch('/api/posts');
            const posts = await res.json();
            const div = document.getElementById('listaPosts');
            if (!div) return;
            if (!posts.length) { div.innerHTML = '<p>Sin publicaciones</p>'; return; }
            div.innerHTML = posts.map(post => `
                <div class="post-item">
                    <strong>${escapeHtml(post.titulo)}</strong><br>
                    <small>${post.tipo} | ${post.categoria_nombre ? post.categoria_nombre+' | ' : ''}${new Date(post.fecha_creacion).toLocaleString()} | por ${escapeHtml(post.userAdmin)}</small><br>
                    <button class="editar" onclick="editarPost(${post.id})">✏️ Editar</button>
                    <button onclick="eliminarPost(${post.id})">🗑️ Eliminar</button>
                </div>
            `).join('');
        } catch(e) {}
    }

    window.eliminarPost = async function(id) {
        if (!confirm('¿Eliminar publicación?')) return;
        try {
            const res = await fetch(`/api/posts/${id}`, { method: 'DELETE' });
            if (res.ok) {
                alert('Publicación eliminada');
                cargarListaPosts();
            } else alert('Error');
        } catch(e) { alert('Error'); }
    };

    window.editarPost = async function(id) {
        try {
            const resPost = await fetch(`/api/posts/${id}`);
            const post = await resPost.json();
            await recargarCategorias();
            const modal = document.createElement('div');
            modal.className = 'modal-editar';
            modal.innerHTML = `
                <div class="modal-editar-content">
                    <h3>✏️ Editar Publicación</h3>
                    <input type="text" id="editTitulo" value="${escapeHtml(post.titulo)}" placeholder="Título">
                    <textarea id="editContenido" rows="3">${escapeHtml(post.contenido || '')}</textarea>
                    <select id="editTipo">
                        <option value="Noticia" ${post.tipo === 'Noticia' ? 'selected' : ''}>📰 Noticia</option>
                        <option value="Investigacion" ${post.tipo === 'Investigacion' ? 'selected' : ''}>🔬 Investigación</option>
                        <option value="Avistamiento" ${post.tipo === 'Avistamiento' ? 'selected' : ''}>🔭 Avistamiento</option>
                    </select>
                    <select id="editCategoria"></select>
                    <input type="text" id="editEnlace" value="${escapeHtml(post.enlace_externo || '')}" placeholder="Enlace externo">
                    <input type="file" id="editArchivo" accept="image/*,application/pdf">
                    <p style="font-size:0.7rem;">Si subes archivo, reemplazará al anterior</p>
                    <button onclick="guardarEdicion(${id})">💾 Guardar cambios</button>
                    <button onclick="this.closest('.modal-editar').remove()" style="background:#ff4444;">Cancelar</button>
                </div>
            `;
            document.body.appendChild(modal);
            const selectCat = document.getElementById('editCategoria');
            function addOptions(arr, nivel = 0) {
                arr.forEach(cat => {
                    selectCat.innerHTML += `<option value="${cat.id}" ${post.categoria_id == cat.id ? 'selected' : ''}>${'—'.repeat(nivel)} ${cat.nombre}</option>`;
                    if (cat.hijos) addOptions(cat.hijos, nivel + 1);
                });
            }
            addOptions(categoriasArbol);
        } catch(e) { alert('Error al cargar publicación'); }
    };

    window.guardarEdicion = async function(id) {
        const formData = new FormData();
        formData.append('titulo', document.getElementById('editTitulo').value);
        formData.append('contenido', document.getElementById('editContenido').value);
        formData.append('tipo', document.getElementById('editTipo').value);
        formData.append('categoria_id', document.getElementById('editCategoria').value);
        formData.append('enlace_externo', document.getElementById('editEnlace').value);
        formData.append('userAdmin', userAdmin);
        const archivo = document.getElementById('editArchivo').files[0];
        if (archivo) formData.append('archivo', archivo);
        try {
            const res = await fetch(`/api/posts/${id}`, { method: 'PUT', body: formData });
            if (res.ok) {
                alert('✅ Publicación actualizada');
                document.querySelector('.modal-editar')?.remove();
                cargarListaPosts();
            } else alert('Error');
        } catch(e) { alert('Error'); }
    };

    async function cargarUsuarios() {
        const res = await fetch('/api/admin/usuarios');
        const usuarios = await res.json();
        const div = document.getElementById('listaUsuarios');
        if (!div) return;
        if (!usuarios.length) { div.innerHTML = '<p>Sin registros</p>'; return; }
        div.innerHTML = usuarios.map(u => `<div class="usuario-item"><strong>${escapeHtml(u.nombre)}</strong><br>📅 ${new Date(u.fecha_registro).toLocaleString()} | IP: ${u.ip||'desconocida'}</div>`).join('');
    }

    async function cargarSuscriptores() {
        const res = await fetch('/api/admin/suscriptores');
        const subs = await res.json();
        const div = document.getElementById('listaSuscriptores');
        if (!div) return;
        if (!subs.length) { div.innerHTML = '<p>Sin suscriptores</p>'; return; }
        div.innerHTML = subs.map(s => `<div class="usuario-item">🤖 ${s.nombre||'Usuario'} ${s.username?'@'+s.username:''}<br>📅 ${new Date(s.fecha_suscripcion).toLocaleString()}</div>`).join('');
    }

    async function cargarWhatsAppActual() {
        try {
            const res = await fetch('/api/config');
            const cfg = await res.json();
            if(document.getElementById('whatsappNumero')) document.getElementById('whatsappNumero').value = cfg.whatsapp;
        } catch(e) {}
    }

    window.actualizarWhatsApp = async function() {
        const numero = document.getElementById('whatsappNumero').value;
        if(!numero.match(/^[0-9]{10,15}$/)) { document.getElementById('msgWhatsapp').innerHTML = '<div class="error">Número inválido</div>'; return; }
        const res = await fetch('/api/config/whatsapp', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ numero }) });
        if(res.ok) document.getElementById('msgWhatsapp').innerHTML = '<div class="exito">✅ Actualizado</div>';
        else document.getElementById('msgWhatsapp').innerHTML = '<div class="error">Error</div>';
    };

    window.guardarConfigBot = async function() {
        const token = document.getElementById('botToken').value.trim();
        const adminId = document.getElementById('adminId').value.trim();
        if(!token) { document.getElementById('msgBot').innerHTML = '<div class="error">Token requerido</div>'; return; }
        let res1 = await fetch('/api/admin/bot_token', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ token }) });
        let res2 = { ok: true };
        if (adminId) res2 = await fetch('/api/admin/admin_id', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ id: adminId }) });
        if(res1.ok && res2.ok) { window.botTokenActual = token; window.adminIdActual = adminId; document.getElementById('msgBot').innerHTML = '<div class="exito">✅ Guardado</div>'; }
        else document.getElementById('msgBot').innerHTML = '<div class="error">Error</div>';
    };

    window.configurarWebhook = async function() {
        const token = document.getElementById('botToken').value.trim();
        if(!token) { document.getElementById('msgWebhook').innerHTML = '<div class="error">Primero guarda token</div>'; return; }
        const urlActual = window.location.origin;
        try {
            const res = await fetch(`https://api.telegram.org/bot${token}/setWebhook?url=${urlActual}/webhook`);
            const data = await res.json();
            if(data.ok) document.getElementById('msgWebhook').innerHTML = '<div class="exito">✅ Webhook configurado</div>';
            else document.getElementById('msgWebhook').innerHTML = `<div class="error">Error: ${data.description}</div>`;
        } catch(e) { document.getElementById('msgWebhook').innerHTML = '<div class="error">Error de conexión</div>'; }
    };

    window.cambiarPass = async function() {
        const nuevaPass = document.getElementById('nuevaPass').value;
        if(nuevaPass.length<4) { document.getElementById('msgPass').innerHTML = '<div class="error">Mínimo 4 caracteres</div>'; return; }
        const res = await fetch('/api/admin/cambiar_pass', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ nuevaPass }) });
        if(res.ok) { document.getElementById('msgPass').innerHTML = '<div class="exito">✅ Contraseña cambiada</div>'; document.getElementById('nuevaPass').value=''; }
        else document.getElementById('msgPass').innerHTML = '<div class="error">Error</div>';
    };

    async function renderPanel() {
        const html = `
            <h2>🛸 Panel de Control ACAES</h2>
            <button onclick="logout()" style="background:#ff4444; margin-bottom:20px;">🚪 Cerrar sesión</button>
            <div class="tabs">
                <div class="tab activo" onclick="mostrarTab('publicar')">📝 Publicar</div>
                <div class="tab" onclick="mostrarTab('categorias')">📁 Categorías</div>
                <div class="tab" onclick="mostrarTab('bot')">🤖 Bot Telegram</div>
                <div class="tab" onclick="mostrarTab('config')">⚙️ Configuración</div>
                <div class="tab" onclick="mostrarTab('usuarios')">👥 Usuarios</div>
                <div class="tab" onclick="mostrarTab('suscriptores')">📡 Suscriptores</div>
                <div class="tab" onclick="mostrarTab('posts')">📋 Publicaciones</div>
            </div>
            <div id="tab-publicar" class="tab-content activo">
                <div class="seccion">
                    <h3>📝 Nueva publicación</h3>
                    <form id="formPublicar" enctype="multipart/form-data">
                        <input type="text" id="titulo" placeholder="Título *" required>
                        <textarea id="contenido" rows="3" placeholder="Descripción"></textarea>
                        <select id="tipo">
                            <option value="Noticia">📰 Noticia</option>
                            <option value="Investigacion">🔬 Investigación</option>
                            <option value="Avistamiento">🔭 Avistamiento</option>
                        </select>
                        <label>Categoría principal:</label>
                        <select id="categoriaSelect" required></select>
                        <label>Subcategoría (opcional):</label>
                        <select id="subcategoriaSelect"></select>
                        <div class="flex-row">
                            <button type="button" id="btnNuevaSubcategoria" style="background:#ffaa00;">➕ Crear nueva subcategoría</button>
                        </div>
                        <input type="text" id="enlace_externo" placeholder="Enlace externo">
                        <input type="file" id="archivo" accept="image/*,application/pdf">
                        <button type="submit">🚀 PUBLICAR</button>
                    </form>
                    <div class="preview"><strong>Vista previa:</strong><div id="previewContent"></div></div>
                </div>
            </div>
            <div id="tab-categorias" class="tab-content">
                <div class="seccion">
                    <h3>📁 Gestionar Categorías</h3>
                    <button onclick="mostrarFormNuevaCategoria()" style="background:#00d4ff; margin-bottom:15px;">+ Nueva Categoría</button>
                    <div id="listaCategorias">Cargando...</div>
                    <div id="formCategoria" style="display:none; margin-top:20px; padding:15px; background:#1a1f2a; border-radius:12px;">
                        <h4>Formulario Categoría</h4>
                        <input type="hidden" id="catId">
                        <input type="text" id="catNombre" placeholder="Nombre">
                        <input type="text" id="catSlug" placeholder="slug">
                        <select id="catPadreSelect"></select>
                        <input type="number" id="catOrden" placeholder="Orden" value="0">
                        <button onclick="guardarCategoria()">Guardar</button>
                        <button onclick="document.getElementById('formCategoria').style.display='none'">Cancelar</button>
                    </div>
                </div>
            </div>
            <div id="tab-bot" class="tab-content"><div class="seccion"><h3>🤖 Bot Telegram</h3><label>Token:</label><input type="text" id="botToken" value="${window.botTokenActual || ''}"><label>ID Admin:</label><input type="text" id="adminId" value="${window.adminIdActual || ''}"><button onclick="guardarConfigBot()">Guardar</button><div id="msgBot"></div><hr><button onclick="configurarWebhook()">Configurar Webhook</button><div id="msgWebhook"></div></div></div>
            <div id="tab-config" class="tab-content"><div class="seccion"><h3>⚙️ Configuración General</h3><label>WhatsApp:</label><input type="text" id="whatsappNumero"><button onclick="actualizarWhatsApp()">Actualizar WhatsApp</button><div id="msgWhatsapp"></div><hr><label>Nueva contraseña admin:</label><input type="password" id="nuevaPass"><button onclick="cambiarPass()">Cambiar contraseña</button><div id="msgPass"></div></div></div>
            <div id="tab-usuarios" class="tab-content"><div class="seccion"><h3>👥 Usuarios registrados</h3><div id="listaUsuarios">Cargando...</div></div></div>
            <div id="tab-suscriptores" class="tab-content"><div class="seccion"><h3>📡 Suscriptores de Telegram</h3><div id="listaSuscriptores">Cargando...</div></div></div>
            <div id="tab-posts" class="tab-content"><div class="seccion"><h3>📋 Publicaciones</h3><div id="listaPosts">Cargando...</div></div></div>
        `;
        document.getElementById('app').innerHTML = html;

        await llenarSelectCategorias('categoriaSelect');
        document.getElementById('categoriaSelect').addEventListener('change', () => llenarSubcategorias('categoriaSelect', 'subcategoriaSelect'));
        document.getElementById('btnNuevaSubcategoria').onclick = () => crearSubcategoria();

        await cargarListaCategorias();
        await cargarListaPosts();
        await cargarUsuarios();
        await cargarSuscriptores();
        await cargarWhatsAppActual();
        if (window.botTokenActual) document.getElementById('botToken').value = window.botTokenActual;
        if (window.adminIdActual) document.getElementById('adminId').value = window.adminIdActual;

        actualizarVistaPrevia();
        document.getElementById('formPublicar').onsubmit = publicar;
        document.getElementById('titulo').addEventListener('input', actualizarVistaPrevia);
        document.getElementById('contenido').addEventListener('input', actualizarVistaPrevia);
        document.getElementById('tipo').addEventListener('change', actualizarVistaPrevia);
        document.getElementById('enlace_externo').addEventListener('input', actualizarVistaPrevia);
        document.getElementById('archivo').addEventListener('change', actualizarVistaPrevia);
    }

    window.mostrarTab = function(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('activo'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('activo'));
        document.getElementById(`tab-${tab}`).classList.add('activo');
        if(event && event.target) event.target.classList.add('activo');
    };

    function actualizarVistaPrevia() {
        const titulo = document.getElementById('titulo')?.value || 'Sin título';
        const tipo = document.getElementById('tipo')?.value || '';
        const contenido = document.getElementById('contenido')?.value || '';
        const enlace = document.getElementById('enlace_externo')?.value || '';
        const archivo = document.getElementById('archivo')?.files[0];
        let html = `<strong>${escapeHtml(titulo)}</strong> (${tipo})<br>`;
        if(contenido) html += `<p>${escapeHtml(contenido.substring(0,100))}...</p>`;
        if(enlace) html += `🔗 Enlace listo<br>`;
        if(archivo) html += `📎 ${archivo.name}`;
        const preview = document.getElementById('previewContent');
        if(preview) preview.innerHTML = html;
    }

    async function publicar(e) {
        e.preventDefault();
        const categoriaId = document.getElementById('categoriaSelect').value;
        const subcategoriaId = document.getElementById('subcategoriaSelect').value;
        const categoriaFinal = subcategoriaId || categoriaId;
        if (!categoriaFinal) { alert('Debes seleccionar al menos una categoría principal'); return; }
        const formData = new FormData();
        formData.append('titulo', document.getElementById('titulo').value);
        formData.append('contenido', document.getElementById('contenido').value);
        formData.append('tipo', document.getElementById('tipo').value);
        formData.append('categoria_id', categoriaFinal);
        formData.append('enlace_externo', document.getElementById('enlace_externo').value);
        formData.append('userAdmin', userAdmin);
        const archivo = document.getElementById('archivo').files[0];
        if(archivo) formData.append('archivo', archivo);
        const btn = document.querySelector('#formPublicar button');
        btn.disabled = true; btn.innerText = '🛰️ Publicando...';
        try {
            const res = await fetch('/api/publicar', { method: 'POST', body: formData });
            if(res.ok) { alert('✅ Publicado'); document.getElementById('formPublicar').reset(); actualizarVistaPrevia(); cargarListaPosts(); }
            else alert('Error');
        } catch(e) { alert('Error'); }
        finally { btn.disabled = false; btn.innerText = '🚀 PUBLICAR'; }
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }

    checkAuth();
</script>
</body>
    </html>
