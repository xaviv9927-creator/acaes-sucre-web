<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ACAES | Asociación de Ciencias Astronómicas del Estado Sucre</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0e14; color: #e0e0e0; font-family: system-ui, sans-serif; overscroll-behavior: none; }
        .top-bar { background: #0a0c10; border-bottom: 2px solid #00d4ff; padding: 0 20px; position: sticky; top: 0; z-index: 1000; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; }
        .logo h1 { font-size: 1.5rem; color: #00d4ff; }
        .nav-menu { display: flex; list-style: none; gap: 8px; flex-wrap: wrap; }
        .nav-menu li { position: relative; }
        .nav-menu a { display: block; padding: 16px 18px; color: #e0e0e0; text-decoration: none; font-size: 1rem; font-weight: 500; transition: 0.2s; border-radius: 8px; cursor: pointer; }
        .nav-menu a:hover, .nav-menu a.activo { background: #00d4ff22; color: #00d4ff; border-bottom: 2px solid #00d4ff; }
        .dropdown-content { display: none; position: absolute; background: #11141c; min-width: 200px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); z-index: 1; border: 1px solid #00d4ff33; border-radius: 8px; top: 100%; left: 0; }
        .dropdown-content a { padding: 12px 16px; font-size: 0.9rem; border-bottom: 1px solid #2a2f3a; }
        .dropdown-content a:last-child { border-bottom: none; }
        .dropdown:hover .dropdown-content { display: block; }
        @media (max-width: 768px) {
            .nav-menu { display: none; flex-direction: column; width: 100%; background: #0a0c10; padding: 10px 0; }
            .nav-menu.active { display: flex; }
            .menu-toggle { display: block; font-size: 2rem; cursor: pointer; color: #00d4ff; }
            .dropdown-content { position: static; box-shadow: none; padding-left: 20px; background: #0f121c; }
            .nav-menu a { padding: 12px; }
        }
        .menu-toggle { display: none; }
        .header { text-align: center; padding: 20px; border-bottom: 1px solid #00d4ff33; }
        .feed { padding: 20px; max-width: 900px; margin: auto; }
        .post { background: #12161f; border: 1px solid #00d4ff; border-radius: 16px; margin-bottom: 25px; padding: 18px; }
        .post h3 { color: #00d4ff; margin-bottom: 10px; }
        .post img { max-width: 100%; border-radius: 12px; margin: 12px 0; cursor: pointer; }
        .tipo { font-size: 0.7rem; background: #1e2a3a; display: inline-block; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; }
        .categoria-tag { font-size: 0.7rem; background: #00d4ff33; display: inline-block; padding: 4px 12px; border-radius: 20px; margin-left: 8px; }
        .ws-float { position: fixed; bottom: 20px; right: 20px; background: #25D366; border-radius: 50%; padding: 14px; text-decoration: none; font-size: 28px; box-shadow: 0 2px 10px black; z-index: 1000; }
        .loader { text-align: center; padding: 40px; color: #00d4ff; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: #1a1f2a; padding: 25px; border-radius: 20px; width: 90%; max-width: 350px; border: 1px solid #00d4ff; }
        .modal-content input { width: 100%; margin: 10px 0; padding: 12px; background: #0b0e14; border: 1px solid #00d4ff; color: white; border-radius: 10px; }
        .modal-content button { background: #00d4ff; color: #0b0e14; border: none; padding: 12px; width: 100%; border-radius: 40px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .mensaje-bienvenida { background: #00d4ff22; border-left: 3px solid #00d4ff; padding: 10px 15px; margin: 10px; border-radius: 8px; text-align: center; }
        .cerrar-modal { background: #ff4444 !important; margin-top: 5px; }
        small { color: #888; font-size: 0.7rem; }
        .btn-instalar { background: #00d4ff; color: #0b0e14; border: none; padding: 12px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; margin: 20px auto 5px auto; display: block; }
        .credito { text-align: center; font-size: 0.7rem; color: #555; margin-top: 10px; margin-bottom: 20px; }
    </style>
    <script>
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const btn = document.getElementById('btnInstalar');
            if(btn) btn.style.display = 'block';
        });
        function instalarApp() {
            if(deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
            }
        }
        function toggleMenu() {
            document.querySelector('.nav-menu').classList.toggle('active');
        }
        // Cerrar menú al hacer clic fuera
        document.addEventListener('click', function(event) {
            const menu = document.querySelector('.nav-menu');
            const toggle = document.querySelector('.menu-toggle');
            if (menu && toggle && !menu.contains(event.target) && !toggle.contains(event.target)) {
                menu.classList.remove('active');
            }
        });
    </script>
</head>
<body>
<div class="top-bar">
    <div class="nav-container">
        <div class="logo"><h1>🔭 ACAES</h1></div>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <ul class="nav-menu" id="navMenu"></ul>
    </div>
</div>
<div class="header">
    <div class="sub">Asociación de Ciencias Astronómicas del Estado Sucre</div>
</div>
<div id="mensajeBienvenida" class="mensaje-bienvenida"></div>
<div id="feed" class="feed"><div class="loader">Cargando...</div></div>
<a id="wsLink" class="ws-float">💬</a>
<button id="btnInstalar" onclick="instalarApp()" style="display: none; margin: 20px auto 5px auto;" class="btn-instalar">📲 Instalar App</button>
<div class="credito">Diseñador: Xavier Vargas</div>

<script>
    let whatsappNumero = '584240000000';
    let categoriaActivaSlug = 'inicio';
    let intervalCarga;
    let categoriasData = []; // guardar el árbol para no recargar todo el tiempo

    async function cargarConfig() {
        try {
            const res = await fetch('/api/config');
            const cfg = await res.json();
            whatsappNumero = cfg.whatsapp;
            document.getElementById('wsLink').href = `https://wa.me/${whatsappNumero}?text=Hola%20ACAES`;
        } catch(e) {}
    }

    // Construir menú a partir de datos y resaltar categoría activa
    function construirMenu(categorias, slugActivo) {
        const navMenu = document.getElementById('navMenu');
        navMenu.innerHTML = '';
        categorias.forEach(cat => {
            const li = document.createElement('li');
            if (cat.hijos && cat.hijos.length > 0) {
                li.className = 'dropdown';
                const a = document.createElement('a');
                a.textContent = cat.nombre;
                a.onclick = (e) => { e.preventDefault(); cargarPorCategoria(cat.slug); };
                if (slugActivo === cat.slug) a.classList.add('activo');
                li.appendChild(a);
                const subDiv = document.createElement('div');
                subDiv.className = 'dropdown-content';
                cat.hijos.forEach(hijo => {
                    const subA = document.createElement('a');
                    subA.textContent = hijo.nombre;
                    subA.onclick = (e) => { e.preventDefault(); cargarPorCategoria(hijo.slug); };
                    if (slugActivo === hijo.slug) subA.classList.add('activo');
                    subDiv.appendChild(subA);
                });
                li.appendChild(subDiv);
            } else {
                const a = document.createElement('a');
                a.textContent = cat.nombre;
                a.onclick = (e) => { e.preventDefault(); cargarPorCategoria(cat.slug); };
                if (slugActivo === cat.slug) a.classList.add('activo');
                li.appendChild(a);
            }
            navMenu.appendChild(li);
        });
        // Admin link
        fetch('/api/admin/check').then(res => res.json()).then(data => {
            if (data.logged) {
                const liAdmin = document.createElement('li');
                const aAdmin = document.createElement('a');
                aAdmin.href = '/admin';
                aAdmin.textContent = '⚙️ Admin';
                liAdmin.appendChild(aAdmin);
                navMenu.appendChild(liAdmin);
            }
        }).catch(()=>{});
    }

    async function cargarMenu() {
        try {
            const res = await fetch('/api/categorias');
            categoriasData = await res.json();
            construirMenu(categoriasData, categoriaActivaSlug);
        } catch(e) { console.log(e); }
    }

    window.cargarPorCategoria = async function(slug) {
        if (slug === categoriaActivaSlug) return; // ya estamos ahí
        categoriaActivaSlug = slug;
        localStorage.setItem('acaes_categoria_activa', slug);
        // Actualizar resaltado sin recargar todo el menú
        document.querySelectorAll('#navMenu a').forEach(a => {
            const aSlug = a.getAttribute('data-slug');
            if (aSlug === slug) a.classList.add('activo');
            else a.classList.remove('activo');
        });
        document.getElementById('feed').innerHTML = '<div class="loader">Cargando...</div>';
        try {
            const res = await fetch(`/api/posts/categoria/${slug}`);
            const posts = await res.json();
            renderizarPosts(posts);
        } catch(e) {
            document.getElementById('feed').innerHTML = '<div class="post">Error al cargar</div>';
        }
    };

    async function verificarRegistro() {
        const nombreGuardado = localStorage.getItem('acaes_usuario');
        if (nombreGuardado) {
            try {
                const res = await fetch(`/api/usuario/${encodeURIComponent(nombreGuardado)}`);
                if (!res.ok) throw new Error();
                const data = await res.json();
                if (data.exists) {
                    document.getElementById('mensajeBienvenida').innerHTML = `🌟 ¡Bienvenido de vuelta, ${escapeHtml(nombreGuardado)}! 🌟`;
                    return true;
                } else {
                    localStorage.removeItem('acaes_usuario');
                }
            } catch(e) {
                document.getElementById('mensajeBienvenida').innerHTML = `⚠️ Conectando... ${escapeHtml(nombreGuardado)}`;
                return true;
            }
        }
        mostrarModalRegistro();
        return false;
    }

    function mostrarModalRegistro() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.id = 'modalRegistro';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>📝 Regístrate en ACAES</h3>
                <input type="text" id="regNombre" placeholder="Tu nombre completo *">
                <button onclick="registrarUsuario()">📡 Registrarme</button>
                <button class="cerrar-modal" onclick="cerrarModal()">Ahora no</button>
            </div>
        `;
        document.body.appendChild(modal);
    }

    window.cerrarModal = function() {
        const modal = document.getElementById('modalRegistro');
        if(modal) modal.remove();
    };

    window.registrarUsuario = async function() {
        const nombre = document.getElementById('regNombre').value.trim();
        if (!nombre || nombre.length < 3) { alert('Mínimo 3 letras'); return; }
        try {
            const res = await fetch('/api/registrar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre })
            });
            if (res.ok) {
                localStorage.setItem('acaes_usuario', nombre);
                document.getElementById('mensajeBienvenida').innerHTML = `🌟 ¡Bienvenido, ${escapeHtml(nombre)}! 🌟`;
                cerrarModal();
            } else { alert('Error'); }
        } catch(e) { alert('Error de conexión'); }
    };

    async function cargarPosts() {
        try {
            const res = await fetch('/api/posts');
            const posts = await res.json();
            localStorage.setItem('feed_cache', JSON.stringify(posts));
            renderizarPosts(posts);
        } catch (e) {
            const cache = localStorage.getItem('feed_cache');
            if (cache) renderizarPosts(JSON.parse(cache));
            else document.getElementById('feed').innerHTML = '<div class="post">⚠️ Sin conexión</div>';
        }
    }

    function renderizarPosts(posts) {
        const feedDiv = document.getElementById('feed');
        if (!posts || !posts.length) {
            feedDiv.innerHTML = '<div class="post">🌌 No hay publicaciones aún.</div>';
            return;
        }
        feedDiv.innerHTML = posts.map(post => `
            <div class="post">
                <div>
                    <span class="tipo">${escapeHtml(post.tipo || 'Noticia')}</span>
                    ${post.categoria_nombre ? `<span class="categoria-tag">📁 ${escapeHtml(post.categoria_nombre)}</span>` : ''}
                </div>
                <h3>${escapeHtml(post.titulo)}</h3>
                ${post.contenido ? `<p>${escapeHtml(post.contenido)}</p>` : ''}
                ${post.url_media && post.url_media.match(/\.(jpg|jpeg|png|webp)$/i) ? `<img src="${post.url_media}" loading="lazy" onclick="window.open(this.src)">` : ''}
                ${post.url_media && post.url_media.match(/\.pdf$/i) ? `<p>📄 <a href="${post.url_media}" target="_blank">Ver PDF</a></p>` : ''}
                ${post.enlace_externo ? `<p>🔗 <a href="${post.enlace_externo}" target="_blank">Acceder</a></p>` : ''}
                <small>📅 ${new Date(post.fecha_creacion).toLocaleString()} | 👤 ${escapeHtml(post.userAdmin)}</small>
            </div>
        `).join('');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    // Inicialización
    cargarConfig();
    cargarMenu().then(() => {
        const slugGuardado = localStorage.getItem('acaes_categoria_activa');
        if (slugGuardado && slugGuardado !== 'null') {
            cargarPorCategoria(slugGuardado);
        } else {
            cargarPosts();
        }
    });
    verificarRegistro();

    // Recarga periódica solo si la página está visible y no está activa una categoría (o si, pero sin regenerar menú)
    window.addEventListener('load', () => {
        if (intervalCarga) clearInterval(intervalCarga);
        intervalCarga = setInterval(() => {
            if (!document.hidden) {
                if (categoriaActivaSlug && categoriaActivaSlug !== 'inicio') {
                    fetch(`/api/posts/categoria/${categoriaActivaSlug}`).then(r=>r.json()).then(posts => renderizarPosts(posts)).catch(e=>{});
                } else {
                    cargarPosts();
                }
            }
        }, 120000);
    });
    window.addEventListener('beforeunload', () => clearInterval(intervalCarga));
</script>
</body>
</html>
